<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>双向链表指针标记</title>
<style>
body {
    font-family: Arial;
    background: #f0f0f0;
    padding: 40px;
}

.list {
    display: flex;
    align-items: center;
    gap: 40px;
}

.node {
    width: 120px;
    height: 70px;
    background: #fff;
    border: 2px solid #333;
    border-radius: 6px;
    position: relative;
    text-align: center;
    padding-top: 8px;
}

/* 标记 p 和 s */
.p { border-color: red; }
.s { border-color: blue; }

.tag {
    font-size: 14px;
    font-weight: bold;
}

.ptr {
    position: absolute;
    font-size: 12px;
    color: #555;
}

/* 指针标注位置 */
.next {
    right: -35px;
    top: 30px;
}
.prior {
    left: -45px;
    top: 30px;
}
</style>
</head>
<body>

<h2>双向链表：p、s、next、prior 指代标记</h2>

<div class="list">
    <!-- A 结点 -->
    <div class="node">
        <div class="tag">A</div>
        <div class="ptr next">next →</div>
    </div>

    <!-- s 结点 -->
    <div class="node s">
        <div class="tag">s（新结点）</div>
        <div class="ptr prior">← prior</div>
        <div class="ptr next">next →</div>
    </div>

    <!-- p 结点 -->
    <div class="node p">
        <div class="tag">p（参照结点）</div>
        <div class="ptr prior">← prior</div>
    </div>
</div>

<hr>

<h3>对应指针代码</h3>

<pre>
s->next  = p;
s->prior = p->prior;
p->prior->next = s;
p->prior = s;
</pre>

</body>
</html>
