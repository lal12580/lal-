<!DOCTYPE html>
<html lang="en">
<head>

    <!-- 浏览器标题 -->

    <!-- 网页图标 -->

<body>
    <!-- 头部左右两个灯笼 -->
    <div class="lantern left"></div>
    <div class="lantern right"></div>
    </div class="hhhh">

        <ul class="allhead">
            <li class="cube" id="cube">
                <div class="face front">马</div>
                <div class="face back">马</div>

                <div class="face right">马</div>
                <div class="face top">马</div>
                <div class="face bottom">马</div>
            </li>
            <li class="cube" id="cube">
                <div class="face front">年</div>
                <div class="face back">年</div>
                <div class="face left">年</div>
                <div class="face right">年</div>
                <div class="face top">年</div>
                <div class="face bottom">年</div>
            </li>
            <li class="cube" id="cube">
                <div class="face front">快</div>
                <div class="face back">快</div>
                <div class="face left">快</div>
                <div class="face right">快</div>
                <div class="face top">快</div>
                <div class="face bottom">快</div>
            </li>
            <li class="cube" id="cube">
                <div class="face front">乐</div>
                <div class="face back">乐</div>
                <div class="face left">乐</div>
                <div class="face right">乐</div>
                <div class="face top">乐</div>
                <div class="face bottom">乐</div>
            </li>
        </ul>
        <!-- 底部小马 -->
        <div class="horse"></div>
        <!-- 马右边的信 -->
        <div class="letter"></div>
        <!-- 马左边的气球 -->
        <div class="balloon"></div>
